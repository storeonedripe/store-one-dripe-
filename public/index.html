<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STORE ONE DRIPE.MA</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
}

.products{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.card{
    width:260px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    padding:15px;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:#555;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#000;
    color:#fff;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#333;
}

.panier{
    margin-top:40px;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

form{
    margin-top:40px;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

</style>
</head>

<body>

<header>

<h1>STORE ONE DRIPE.MA</h1>

<p>Bienvenue dans notre boutique</p>

</header>

<div class="container">

<h2>Nos Articles</h2>

<div id="products" class="products"></div>

<div class="panier">

<h2>🛒 Mon Panier</h2>

<div id="panier">

Votre panier est vide

</div>

<h3>Total : <span id="total">0</span> DH</h3>

</div>

<h2>Confirmation de commande</h2>

<form id="commandeForm">

<input
type="text"
name="nom"
placeholder="Nom"
required>

<input
type="text"
name="prenom"
placeholder="Prénom"
required>

<input
type="tel"
name="telephone"
placeholder="Téléphone"
required>

<textarea
name="adresse"
placeholder="Adresse"
required></textarea>

<button type="submit">

Confirmer la commande

</button>

</form>

</div>

<script type="module">
    import { db } from "./firebase.js";

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

let panier=[];


// =====================
// Charger Produits
// =====================

async function chargerProduits(){

    let res = await fetch("/products");

    let produits = await res.json();

    let html="";

    produits.forEach(p=>{

        html+=`

        <div class="card">

            <img src="${p.image}">

            <h3>${p.name}</h3>

            <p>${p.description}</p>

            <h3>${p.price} DH</h3>

            <button onclick="ajouterPanier('${p.name}',${p.price})">

                Ajouter au panier

            </button>

        </div>

        `;

    });

    document.getElementById("products").innerHTML=html;

}

chargerProduits();


// =====================
// Ajouter au panier
// =====================

window.ajouterPanier=function(name,price){

    panier.push({

        name:name,

        price:price

    });

    afficherPanier();

}


// =====================
// Afficher Panier
// =====================

function afficherPanier(){

    let html="";

    let total=0;

    panier.forEach((p,index)=>{

        html+=`

        <p>

        ${p.name} - ${p.price} DH

        <button onclick="supprimer(${index})">

        Supprimer

        </button>

        </p>

        `;

        total+=Number(p.price);

    });

    if(panier.length==0){

        html="Votre panier est vide";

    }

    document.getElementById("panier").innerHTML=html;

    document.getElementById("total").innerHTML=total;

}

window.supprimer=function(index){

    panier.splice(index,1);

    afficherPanier();

}
// =====================
// Confirmer la commande
// =====================

document.getElementById("commandeForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    if(panier.length===0){

        alert("Votre panier est vide");

        return;

    }

    let form = new FormData(this);

    let commande = Object.fromEntries(form);

    commande.panier = panier;

    commande.total = document.getElementById("total").textContent;

    commande.date = new Date().toISOString();

    try{

        await addDoc(
            collection(db,"commandes"),
            commande
        );

        alert("Commande envoyée avec succès");

        panier=[];

        afficherPanier();

        this.reset();

    }catch(err){

        console.error(err);

        alert("Erreur lors de l'envoi de la commande");

    }

});
